experiment:
  name: hw3_dense_ppo_seed0
  project: mini-grp-hw3
  description: Dense MLP policy trained with PPO on privileged state
r_seed: 0
sim:
  task_set: libero_spatial
  eval_tasks:
  - 9
  eval_episodes: 5
  episode_length: 150
  use_fast_env: true
training:
  total_env_steps: 100000
  rollout_length: 128
  ppo_epochs: 10
  minibatch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coeff: 0.5
  entropy_coeff: 0.0
  max_grad_norm: 0.5
  learning_rate: 0.0001
  normalize_advantages: true
  normalize_rewards: false
policy:
  obs_dim: 13
  action_dim: 7
  hidden_dim: 256
  n_layers: 3
eval_interval: 10000
log_interval: 1000
save_interval: 50000
