experiment:
  name: hw3_transformer_grpo_wm300
  project: mini-grp-hw3
  description: Transformer policy fine-tuned from HW1 checkpoint with RL
r_seed: 0
testing: false
init_checkpoint: /teamspace/studios/this_studio/robot_learning_2026/hw3/miniGRP.pth
rl:
  algorithm: grpo
sim:
  task_set: libero_spatial
  eval_tasks:
  - 0
  eval_episodes: 5
  episode_length: 300
  use_fast_env: true
training:
  total_env_steps: 15000
  rollout_length: 128
  ppo_epochs: 4
  grpo_epochs: 4
  minibatch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coeff: 0.5
  entropy_coeff: 0.01
  kl_coeff: 0.01
  max_grad_norm: 0.5
  learning_rate: 0.0002
  normalize_advantages: true
  normalize_rewards: false
grpo:
  group_size: 4
  num_groups: 4
  wm: true
  wm_checkpoint: /teamspace/studios/this_studio/robot_learning_2026/hw3/dreamer_model.pth
  horizon: 10
value:
  hidden_dim: 256
  n_layers: 2
  learning_rate: 0.0002
action_dim: 7
model:
  type: transformer
  image_shape:
  - 64
  - 64
  - 3
  n_embd: 128
  n_head: 4
  n_blocks: 4
  dropout: 0.1
  patch_size: 8
  n_patches: 8
  max_block_size: 16
  vocab_size: 90
  continous: true
  policy:
